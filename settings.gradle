pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropsFile = file("local.properties")
        if (localPropsFile.exists()) {
            localPropsFile.withInputStream { properties.load(it) }
        }
        // local.properties na ho toh environment variable se lo
        def path = properties.getProperty("flutter.sdk") 
                   ?: System.getenv("FLUTTER_ROOT") 
                   ?: System.getenv("flutter.sdk")
        assert path != null, "Flutter SDK path not found!"
        return path
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.2.2" apply false
    id "org.jetbrains.kotlin.android" version "1.9.10" apply false
    id "com.google.gms.google-services" version "4.4.1" apply false
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}

include ":app"